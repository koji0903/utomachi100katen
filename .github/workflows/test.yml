# CI ワークフロー雛形 (今回スコープでは有効化は任意)
# 有効化する場合は GitHub リポジトリの Actions 設定を確認してください。
name: Unit Tests

on:
  push:
    branches:
      - main
      - staging
      - 'feature/**'
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (lib)
        run: npm test

      # ルールテストは Firebase Emulator が必要。必要になったら下記を有効化する:
